"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/usr/bin/tini -g -- /opt/hermes/docker/entrypoint.sh bash /opt/hermes/docker/railway-start.sh"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ALWAYS"
